name: Next.js Deploy to Railway
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run type checking
      run: npm run typecheck
    
    - name: Run linting
      run: npm run lint
    
    - name: Build project
      run: npm run build
      
    - name: Build Docker image
      run: docker build -t primusneo:latest .
    
    - name: Railway Deploy
      uses: railway-actions/deploy@main
      with:
        key: ${{ secrets.RAILWAY_API_KEY }}
        config: |
          {
            "name": "primusneo",
            "web": {
              "service": {
                "containerName": "primusneo-web",
                "image": "primusneo:latest",
                "ports": ["3000"],
                "env": {
                  "NODE_ENV": "production",
                  "NEXT_PUBLIC_APP_URL": "https://primusneo.railway.app",
                  "DATABASE_URL": "${RAILWAY_DATABASE_URL}",
                  "NEXTAUTH_SECRET": "${NEXTAUTH_SECRET}",
                  "NEXTAUTH_URL": "https://primusneo.railway.app"
                }
              }
            }
          }